<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATEMATIKA WITH AULIYA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: linear-gradient(135deg, #a29bfe, #fd79a8, #74b9ff);
            --card: rgba(255, 255, 255, 0.95);
            --text: #2d3436;
            --primary: #6c5ce7;
            --success: #00b894;
            --wrong: #d63031;
            --chrome-bg: #f1f3f4;
            --chrome-header: #dee1e6;
        }

        .dark-mode {
            --bg: linear-gradient(135deg, #2d3436, #000000);
            --card: rgba(45, 52, 54, 0.98);
            --text: #dfe6e9;
            --primary: #a29bfe;
        }

        * { box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); height: 100vh; overflow: hidden; color: var(--text); }

        /* SIMULASI CHROME BROWSER */
        #chrome-browser {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--chrome-bg);
            z-index: 9999;
            display: none;
            flex-direction: column;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .chrome-header { background: var(--chrome-header); padding: 8px 8px 0 8px; border-bottom: 1px solid #ccc; }
        .chrome-tabs { display: flex; gap: 5px; }
        .chrome-tab { 
            background: white; width: 180px; padding: 10px 15px; 
            border-radius: 12px 12px 0 0; font-size: 11px; font-weight: 600;
            display: flex; align-items: center; justify-content: space-between;
        }
        .chrome-controls { 
            background: white; padding: 8px 15px; display: flex; align-items: center; gap: 15px; 
        }
        .chrome-address-bar {
            flex-grow: 1; background: #f1f3f4; padding: 6px 15px; border-radius: 20px;
            font-size: 12px; color: #5f6368; display: flex; align-items: center; gap: 10px;
        }
        .chrome-content { flex-grow: 1; border: none; width: 100%; background: white; }

        /* KODE ASLI KAMU */
        .watermark-note {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            font-size: 11px; font-weight: 800; color: var(--primary);
            background: rgba(255, 255, 255, 0.2); padding: 5px 15px;
            border-radius: 20px; backdrop-filter: blur(5px); opacity: 0.8;
            z-index: 500; pointer-events: none; text-transform: uppercase;
            letter-spacing: 1.5px; white-space: nowrap;
        }

        .navbar { position: fixed; top: 0; width: 100%; height: 60px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; }
        .container { margin: 90px auto; padding: 30px; width: 90%; max-width: 400px; background: var(--card); border-radius: 30px; text-align: center; position: relative; z-index: 10; }
        
        input[type="text"] { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 20px; outline: none; }
        .btn { background: var(--primary); color: white; padding: 16px; width: 100%; border-radius: 15px; font-weight: 700; border: none; cursor: pointer; }

        #game-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 4000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .question-card { background: white; padding: 20px; border-radius: 20px; color: #333; width: 100%; max-width: 320px; margin-bottom: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); position: relative; }
        
        .feedback { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 10px; color: white; font-weight: 800; display: none; z-index: 4001; }
        
        .memory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .m-card { height: 80px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: transparent; cursor: pointer; }
        .m-card.flipped { color: white; background: #fd79a8; }
        .m-card.matched { background: var(--success); color: white; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 320px; }
        .opt-btn { background: white; padding: 15px; border-radius: 15px; border: 2px solid #eee; font-weight: 800; cursor: pointer; color: var(--text); }
        
        .hidden { display: none !important; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card); z-index: 2000; padding-top: 50px; }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
        
        .teacher-info { margin-top: 10px; margin-bottom: 20px; font-weight: 700; font-size: 14px; color: var(--primary); }
        .menu-item { display: block; padding: 15px; text-decoration: none; color: var(--text); cursor: pointer; }
    </style>
</head>
<body>

    <div id="chrome-browser">
        <div class="chrome-header">
            <div class="chrome-tabs">
                <div class="chrome-tab">
                    <span><i class="fas fa-graduation-cap" style="color:#1a73e8"></i> Matematika X Kuliner 1</span>
                    <i class="fas fa-times" style="font-size: 10px; color: #5f6368;"></i>
                </div>
            </div>
            <div class="chrome-controls">
                <i class="fas fa-arrow-left" style="color:#5f6368"></i>
                <i class="fas fa-arrow-right" style="color:#bdc1c6"></i>
                <i class="fas fa-sync" style="color:#5f6368"></i>
                <div class="chrome-address-bar">
                    <i class="fas fa-lock" style="font-size: 10px; color: #1e8e3e;"></i>
                    https://smkn1badegan.my.canva.site/matematika-x-kuliner-1
                </div>
                <i class="fas fa-ellipsis-v" style="color:#5f6368"></i>
            </div>
        </div>
        <iframe id="chrome-iframe" class="chrome-content" src=""></iframe>
    </div>

    <div class="watermark-note">Created by karel sigmax</div>

    <nav class="navbar">
        <button style="background:none; border:none; font-size:22px; color:var(--primary)" onclick="toggleMenu()">☰</button>
        <span style="font-weight:800; color:var(--primary)">X KULINER 1</span>
        <button style="background:none; border:none; font-size:20px" onclick="toggleTheme()">🌓</button>
    </nav>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div style="text-align:center; padding:20px">
            <img src="https://cdn-icons-png.flaticon.com/512/3482/3482504.png" width="80">
            <div class="teacher-info">Guru: Auliya Wildhiani, S.Pd</div> 
        </div>
        <a onclick="bukaLinkLuar('https://www.instagram.com/x_culinary.onee')" class="menu-item"><i class="fab fa-instagram"></i> INSTAGRAM KELAS</a>
        <a onclick="bukaLinkLuar('https://www.tiktok.com/@boga_skiba')" class="menu-item"><i class="fab fa-tiktok"></i> TIKTOK KELAS</a>
        <a onclick="bukaLinkLuar('https://www.tiktok.com/@jskyrel29')" class="menu-item"><i class="fab fa-tiktok"></i> TIKTOK GWEJ</a>
        <a href="#" onclick="resetName()" class="menu-item" style="color:red; margin-top: 20px;"><i class="fas fa-sync-alt"></i> GANTI NAMA</a>
    </div>

    <div id="login-screen" class="container">
        <h2>Welcome!</h2>
        <input type="text" id="userName" placeholder="Masukin nama luwh" maxlength="15">
        <button onclick="saveName()" class="btn">MASUK</button>
    </div>

    <div id="dashboard-screen" class="container hidden">
        <h2 id="dash-greeting">Halo!</h2>
        <p>SELESAIKAN TANTANGAN!</p>
        <button onclick="startGame()" class="btn">MULAI TANTANGAN</button>
    </div>

    <div id="game-screen">
        <div id="feedback-box" class="feedback"></div>
        <div style="color:white; font-weight:bold; margin-bottom:10px;">Misi: <span id="soal-ke">1</span> / 5</div>
        <div class="question-card">
            <div id="q-type" style="font-size: 10px; font-weight: 800; color: var(--primary); text-transform: uppercase;">Misi</div>
            <div id="q-icon" style="font-size: 40px; margin: 10px 0;">🎲</div>
            <div id="q-text" style="font-size: 14px; font-weight: 600;">...</div>
            <div id="memory-area" class="hidden"><div class="memory-grid" id="m-grid"></div></div>
        </div>
        <div class="options-grid" id="options"></div>
    </div>

    <script>
        let score = 0, totalSoal = 0, correctAnswer = 0;
        let flippedCards = [], matchedPairs = 0;

        function bukaLinkLuar(url) { window.open(url, '_blank'); }
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }

        function saveName() {
            const name = document.getElementById('userName').value;
            if (name.trim() === "") return alert("Isi nama dulu!");
            localStorage.setItem('kuliner_student_name', name);
            showDashboard(name);
        }

        function showDashboard(name) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('dash-greeting').innerText = `Chef ${name}`;
        }

        function startGame() {
            score = 0; totalSoal = 0;
            document.getElementById('game-screen').style.display = 'flex';
            nextTurn();
        }

        function nextTurn() {
            totalSoal++;
            if (totalSoal > 5) {
                const targetUrl = "https://smkn1badegan.my.canva.site/matematika-x-kuliner-1";
                alert(`Selesai! Skor Akhir: ${score}/5.\nMembuka materi di Chrome...`);
                
                // TAMPILKAN SIMULASI BROWSER
                const browser = document.getElementById('chrome-browser');
                const iframe = document.getElementById('chrome-iframe');
                browser.style.display = 'flex';
                iframe.src = targetUrl;

                // Tetap buka tab baru sungguhan sebagai backup
                setTimeout(() => { window.open(targetUrl, '_blank'); }, 1500);
                return;
            }

            document.getElementById('soal-ke').innerText = totalSoal;
            document.getElementById('memory-area').classList.add('hidden');
            document.getElementById('options').classList.remove('hidden');
            document.getElementById('q-icon').classList.remove('hidden');

            const gameType = Math.floor(Math.random() * 5);
            let a, b;

            if (gameType === 0) {
                document.getElementById('q-type').innerText = "Logika Stok";
                a = Math.floor(Math.random() * 50) + 1;
                correctAnswer = (a % 2 === 0) ? "GENAP" : "GANJIL";
                document.getElementById('q-text').innerText = `Stok telur ada ${a}. Ganjil atau Genap?`;
                renderOptions(["GANJIL", "GENAP"]);
            } else if (gameType === 1) {
                document.getElementById('q-type').innerText = "Takaran Resep";
                a = Math.floor(Math.random() * 5) + 2; b = 3;
                correctAnswer = a * b;
                document.getElementById('q-text').innerText = `1 porsi butuh ${b}kg tepung. Berapa untuk ${a} porsi?`;
                renderOptions([correctAnswer, correctAnswer+2, correctAnswer-1, correctAnswer+5]);
            } else if (gameType === 2) {
                document.getElementById('q-type').innerText = "Manajemen Stok";
                a = 20; b = Math.floor(Math.random() * 10) + 5;
                correctAnswer = a - b;
                document.getElementById('q-text').innerText = `Stok awal 20, dipakai ${b}. Sisa berapa?`;
                renderOptions([correctAnswer, correctAnswer+3, correctAnswer-2, 10]);
            } else if (gameType === 3) {
                document.getElementById('q-type').innerText = "Fokus Chef";
                document.getElementById('q-text').innerText = "Cari 2 pasangan yang sama!";
                document.getElementById('options').classList.add('hidden');
                document.getElementById('memory-area').classList.remove('hidden');
                document.getElementById('q-icon').classList.add('hidden');
                initMemory();
            } else {
                document.getElementById('q-type').innerText = "Suhu Oven";
                correctAnswer = 180;
                document.getElementById('q-text').innerText = `Suhu ideal untuk membakar roti biasanya ... °C?`;
                renderOptions([180, 200, 150, 100]);
            }
        }

        function renderOptions(choices) {
            const container = document.getElementById('options');
            container.innerHTML = '';
            [...new Set(choices)].sort(() => Math.random() - 0.5).forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = val;
                btn.onclick = () => checkResult(val);
                container.appendChild(btn);
            });
        }

        function checkResult(val) {
            const fb = document.getElementById('feedback-box');
            fb.style.display = 'block';
            if (val == correctAnswer) { score++; fb.innerText = "BENUL✅"; fb.style.backgroundColor = "var(--success)"; }
            else { fb.innerText = "SALAH❌"; fb.style.backgroundColor = "var(--wrong)"; }
            setTimeout(() => { fb.style.display = 'none'; nextTurn(); }, 1000);
        }

        function initMemory() {
            const grid = document.getElementById('m-grid'); grid.innerHTML = '';
            let icons = ['🍕', '🍩', '🍔', '🍕', '🍩', '🍔'].sort(() => Math.random() - 0.5);
            flippedCards = []; matchedPairs = 0;
            icons.forEach(icon => {
                const card = document.createElement('div');
                card.className = 'm-card'; card.dataset.icon = icon; card.innerText = icon;
                card.onclick = () => {
                    if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
                        card.classList.add('flipped'); flippedCards.push(card);
                        if (flippedCards.length === 2) {
                            if (flippedCards[0].dataset.icon === flippedCards[1].dataset.icon) {
                                flippedCards.forEach(c => c.classList.add('matched')); matchedPairs++;
                                flippedCards = []; if (matchedPairs === 3) { score++; setTimeout(nextTurn, 1000); }
                            } else {
                                setTimeout(() => { flippedCards.forEach(c => c.classList.remove('flipped')); flippedCards = []; }, 800);
                            }
                        }
                    }
                };
                grid.appendChild(card);
            });
        }

        function resetName() { localStorage.clear(); location.reload(); }
        window.onload = () => {
            const name = localStorage.getItem('kuliner_student_name');
            if (name) showDashboard(name);
        };
    </script>
</body>
</html>
